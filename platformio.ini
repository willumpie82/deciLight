; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1-n4r2]
platform = espressif32
board = esp32-s3-devkitc1-n4r2
framework = arduino

; Adafruit NeoPixel for LED control
lib_deps = 
    adafruit/Adafruit NeoPixel@^1.11.3

; Build flags
build_flags =
    -std=c++17
    -std=gnu++17
    -Wno-deprecated-declarations
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE
    -DCORE_DEBUG_LEVEL=4

; USB Configuration for ESP32-S3
board_build.usb_mode = hw_cdc
board_build.usb_product = "Noise Traffic Light"

; Partition table
board_build.partitions = default_4MB.csv

; Monitor settings
monitor_speed = 115200

; Upload settings
upload_protocol = esptool
; upload_flags = 
;     --before=esp32s3_reset
;     --after=hard_reset
;extra_scripts = post_upload.py
